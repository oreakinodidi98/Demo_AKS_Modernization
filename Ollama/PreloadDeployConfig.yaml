apiVersion: apps/v1
kind: Deployment
metadata:
  name: preload-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preload-ollama
  template:
    metadata:
        labels:
          app: preload-ollama
    spec:
      initContainers:
        # Start Ollama temporarily to pull models
        - name: model-preloader
          image: ollama/ollama:0.1.27
          command:
            - sh
            - /config/pull-script.sh
          volumeMounts:
            - name: preload-ollama-data
              mountPath: /root/.ollama
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: ollama-models
            defaultMode: 0755
      containers:
        - name: ollama
          image: ollama/ollama:0.1.27
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
            # GPU configuration
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: preload-ollama-data
              mountPath: /root/.ollama
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A10G
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: preload-ollama-data
          persistentVolumeClaim:
            claimName: preload-ollama-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: preload-ollama-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: managed-csi
---
apiVersion: v1
kind: Service
metadata:
  name: preload-ollama
spec:
  selector:
    app: preload-ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434