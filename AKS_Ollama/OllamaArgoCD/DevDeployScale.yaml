apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-ollama-scaled
  labels:
    app: dev-ollama-scaled
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dev-ollama-scaled
  template:
    metadata:
      labels:
        app: dev-ollama-scaled
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.1.27
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            # Keep models loaded in memory longer
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            # Set number of parallel requests
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 16Gi
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: dev-ollama-shared-data
              mountPath: /root/.ollama
      volumes:
        - name: dev-ollama-shared-data
          persistentVolumeClaim:
            claimName: dev-ollama-shared-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-ollama-shared-data
spec:
# Using ReadWriteMany storage for shared model cache
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: efs  # EFS, NFS, or similar RWX storage
---
apiVersion: v1
kind: Service
metadata:
  name: dev-ollama
spec:
  selector:
    app: dev-ollama-scaled
  ports:
    - name: http
      port: 11434
      targetPort: 11434