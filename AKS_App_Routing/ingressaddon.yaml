##############################################################################
# App Routing Add-on Ingress - Routes traffic through the managed controller
# IngressClass: webapprouting.kubernetes.azure.com (runs in app-routing-system)
##############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress-addon
  namespace: myapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com  # add-on controller
  rules:
  - host: myapp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myapp
            port:
              number: 80