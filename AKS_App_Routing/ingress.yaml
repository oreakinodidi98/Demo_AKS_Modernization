##############################################################################
# BYO Nginx Ingress - Routes traffic through the self-managed controller
# IngressClass: nginx (runs in ingress-nginx namespace)
##############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress-byo
  namespace: myapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx  # BYO controller
  rules:
  - host: myapp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myapp
            port:
              number: 80